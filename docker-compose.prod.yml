version: '3.8'

services:
  backend:
    build: ./restaurant_management_backend
    ports:
      - "5000:5000"
    env_file:
      - ./.env.prod
    # We remove 'mongo' service here since we use MongoDB Atlas
    environment:
      - NODE_ENV=production
    volumes:
      - /home/ubuntu/uploads:/app/uploads

  frontend:
    build:
      context: ./restaurant_management_admin
      args:
        # Use same-origin Nginx proxy (backend is not exposed publicly on :5000)
        - VITE_API_URL=/api
    environment:
      - VITE_API_URL=/api
    ports:
      - "80:80"
    depends_on:
      - backend

# No volumes needed for local mongo anymore
