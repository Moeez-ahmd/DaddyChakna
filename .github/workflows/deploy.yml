name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          # Package the code
          tar --exclude="node_modules" --exclude=".git" -czvf deployment.tar.gz .
          
          # Upload to EC2
          scp -o StrictHostKeyChecking=no deployment.tar.gz ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~
          
          # Execute remote deployment
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            tar -xzvf deployment.tar.gz && \
            echo 'MONGODB_URI=${{ secrets.MONGODB_URI }}' > .env.prod && \
            echo 'JWT_SECRET=${{ secrets.JWT_SECRET }}' >> .env.prod && \
            echo 'PORT=5000' >> .env.prod && \
            echo 'NODE_ENV=production' >> .env.prod && \
            sudo docker compose -f docker-compose.prod.yml up --build -d
          "
